spring:
  application:
    name: flowguard-server

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  datasource:
    # C-2: credentials via env vars only — no hardcoded fallback
    url: jdbc:p6spy:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:flowguard}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    # Flyway bypasses p6spy — direct JDBC URL
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:flowguard}
    user: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # A-2: show-details only for authenticated users
      show-details: when-authorized

# C-1: no fallback — startup fails if JWT_SECRET is not set
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000 # 24 hours

app:
  cors:
    # C-3: safe local dev default; override via CORS_ALLOWED_ORIGINS in production
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
